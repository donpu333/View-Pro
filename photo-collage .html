<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото Коллаж 6000×4500</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            color: #e0e0ff;
            font-family: 'Roboto', sans-serif;
            padding: 15px;
            min-height: 100vh;
        }
        .collage-container {
            background-color: #12121a;
            border-radius: 8px;
            padding: 15px;
            margin: 0 auto;
            max-width: 100%;
        }
        .collage-header {
            text-align: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #333;
        }
        .collage-title {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #4cc9f0, #4361ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Montserrat', sans-serif;
        }
        .collage-subtitle {
            font-size: 1rem;
            color: #aaa;
            margin-top: 0.3rem;
        }
        .collage-mode-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .mode-btn {
            background-color: #2a2a35;
            color: #bbb;
            border: 1px solid #3a3a4a;
            padding: 8px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #4361ee;
            color: white;
            border-color: #4361ee;
        }
        .mode-btn:hover:not(.active) {
            border-color: #4cc9f0;
            color: #4cc9f0;
        }

        /* ===== РАСКЛАДКИ ===== */
        .collage-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }
        .upload-top {
            display: flex;
            gap: 12px;
            height: 45vh;
            min-height: 300px;
        }
        .upload-bottom {
            display: flex;
            height: 45vh;
            min-height: 300px;
        }
        .four-images-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            height: 80vh;
            min-height: 500px;
        }
        .two-images-layout {
            display: flex;
            gap: 12px;
            height: 70vh;
            min-height: 400px;
        }

        /* ===== ЯЧЕЙКА ЗАГРУЗКИ ===== */
        .upload-box {
            flex: 1;
            border: 2px dashed #3a3a4a;
            border-radius: 12px;
            background-color: #1a1a26;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }
        .upload-box h3 {
            font-size: 0.9rem;
            color: #b0c7ff;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .collage-file-input {
            width: 100%;
            background: #2a2a35;
            color: #ddd;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #444;
            font-size: 0.8rem;
            margin-bottom: 5px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .tf-select {
            width: 100%;
            background: #2a2a35;
            color: white;
            border: 1px solid #444;
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        /* ===== ПРЕВЬЮ ===== */
        .preview-container {
            position: relative;
            width: 100%;
            flex: 1 1 0;
            min-height: 0;
            background: #0a0a12;
            border-radius: 8px;
            overflow: hidden;
        }
        .preview-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ВОТ ГЛАВНОЕ ИЗМЕНЕНИЕ: cover вместо contain */
            object-fit: cover;
            display: none;
        }
        .draggable-text {
            position: absolute;
            color: white;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: bold;
            cursor: move;
            user-select: none;
            z-index: 10;
            text-shadow: 2px 2px 6px black;
            padding: 6px 16px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        /* ===== КНОПКИ ===== */
        .collage-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .collage-btn {
            background: #4361ee;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .collage-btn:disabled {
            background: #2a2a35;
            color: #555;
            cursor: not-allowed;
        }
        .collage-btn:hover:not(:disabled) {
            background: #3f37c9;
        }

        /* ===== РЕЗУЛЬТАТ ===== */
        .collage-result {
            margin-top: 10px;
        }
        .collage-with-text {
            display: flex;
            gap: 15px;
        }
        .collage-column {
            flex: 3;
            min-width: 0;
        }
        .text-column {
            flex: 1;
            background: #1a1a26;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            min-width: 200px;
            height: 300px;
        }
        .text-column textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 0.95rem;
            resize: none;
            outline: none;
        }
        .clear-text-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            align-self: flex-end;
            margin-top: 8px;
        }

        #collageCanvas {
            max-width: 100%;
            display: none;
            border-radius: 10px;
        }
        #combinedCollageCanvas {
            max-width: 100%;
            display: none;
            border-radius: 10px;
            margin-top: 10px;
        }

        .combine-collage-section {
            margin-top: 20px;
            background: #1a1a26;
            border-radius: 14px;
            padding: 15px;
            border: 1px solid #2a2a3a;
        }
        .combine-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .combine-row .upload-box {
            flex: 1;
            min-width: 200px;
            height: 300px;
        }

        @media (max-width: 768px) {
            .upload-top, .two-images-layout {
                flex-direction: column;
                height: auto;
                min-height: 0;
            }
            .upload-bottom {
                height: 50vh;
            }
            .four-images-layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 0;
            }
            .collage-with-text {
                flex-direction: column;
            }
            .upload-top .upload-box {
                height: 35vh;
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
<div class="collage-container">
    <header class="collage-header">
        <h1 class="collage-title">Фото Коллаж 6000×4500</h1>
        <p class="collage-subtitle">Фото заполняет рамку полностью (cover)</p>
    </header>

    <div class="collage-mode-selector">
        <button id="threeModeBtn" class="mode-btn active">3 фото</button>
        <button id="fourModeBtn" class="mode-btn">4 фото</button>
        <button id="twoModeBtn" class="mode-btn">2 фото</button>
    </div>

    <!-- 3 ФОТО -->
    <div id="threeLayout" class="collage-layout">
        <div class="upload-top">
            <div class="upload-box">
                <h3>Верхнее левое (1D)</h3>
                <input type="file" id="imgTL" class="collage-file-input" accept="image/*">
                <select id="selTL" class="tf-select"><option value="1D" selected>1D</option><option value="1W">1W</option><option value="4H">4H</option><option value="1H">1H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select>
                <div class="preview-container" id="prevCTL"><img id="prevTL" class="preview-img"><div id="txtTL" class="draggable-text">1D</div></div>
            </div>
            <div class="upload-box">
                <h3>Верхнее правое (1H)</h3>
                <input type="file" id="imgTR" class="collage-file-input" accept="image/*">
                <select id="selTR" class="tf-select"><option value="1H" selected>1H</option><option value="1W">1W</option><option value="1D">1D</option><option value="4H">4H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select>
                <div class="preview-container" id="prevCTR"><img id="prevTR" class="preview-img"><div id="txtTR" class="draggable-text">1H</div></div>
            </div>
        </div>
        <div class="upload-bottom">
            <div class="upload-box">
                <h3>Нижнее (5M)</h3>
                <input type="file" id="imgBT" class="collage-file-input" accept="image/*">
                <select id="selBT" class="tf-select"><option value="5M" selected>5M</option><option value="1W">1W</option><option value="1D">1D</option><option value="4H">4H</option><option value="1H">1H</option><option value="15M">15M</option><option value="1M">1M</option></select>
                <div class="preview-container" id="prevCBT"><img id="prevBT" class="preview-img"><div id="txtBT" class="draggable-text">5M</div></div>
            </div>
        </div>
    </div>

    <!-- 4 ФОТО -->
    <div id="fourLayout" class="collage-layout" style="display:none">
        <div class="four-images-layout">
            <div class="upload-box"><h3>1D</h3><input type="file" id="img4TL" class="collage-file-input" accept="image/*"><select id="sel4TL" class="tf-select"><option value="1D" selected>1D</option><option value="1W">1W</option><option value="4H">4H</option><option value="1H">1H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select><div class="preview-container"><img id="prev4TL" class="preview-img"><div id="txt4TL" class="draggable-text">1D</div></div></div>
            <div class="upload-box"><h3>4H</h3><input type="file" id="img4TR" class="collage-file-input" accept="image/*"><select id="sel4TR" class="tf-select"><option value="4H" selected>4H</option><option value="1W">1W</option><option value="1D">1D</option><option value="1H">1H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select><div class="preview-container"><img id="prev4TR" class="preview-img"><div id="txt4TR" class="draggable-text">4H</div></div></div>
            <div class="upload-box"><h3>1H</h3><input type="file" id="img4BL" class="collage-file-input" accept="image/*"><select id="sel4BL" class="tf-select"><option value="1H" selected>1H</option><option value="1W">1W</option><option value="1D">1D</option><option value="4H">4H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select><div class="preview-container"><img id="prev4BL" class="preview-img"><div id="txt4BL" class="draggable-text">1H</div></div></div>
            <div class="upload-box"><h3>5M</h3><input type="file" id="img4BR" class="collage-file-input" accept="image/*"><select id="sel4BR" class="tf-select"><option value="5M" selected>5M</option><option value="1W">1W</option><option value="1D">1D</option><option value="4H">4H</option><option value="1H">1H</option><option value="15M">15M</option><option value="1M">1M</option></select><div class="preview-container"><img id="prev4BR" class="preview-img"><div id="txt4BR" class="draggable-text">5M</div></div></div>
        </div>
    </div>

    <!-- 2 ФОТО -->
    <div id="twoLayout" class="collage-layout" style="display:none">
        <div class="two-images-layout">
            <div class="upload-box"><h3>Левое</h3><input type="file" id="img2L" class="collage-file-input" accept="image/*"><select id="sel2L" class="tf-select"><option value="1D" selected>1D</option><option value="1W">1W</option><option value="4H">4H</option><option value="1H">1H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select><div class="preview-container"><img id="prev2L" class="preview-img"><div id="txt2L" class="draggable-text">1D</div></div></div>
            <div class="upload-box"><h3>Правое</h3><input type="file" id="img2R" class="collage-file-input" accept="image/*"><select id="sel2R" class="tf-select"><option value="1H" selected>1H</option><option value="1W">1W</option><option value="1D">1D</option><option value="4H">4H</option><option value="15M">15M</option><option value="5M">5M</option><option value="1M">1M</option></select><div class="preview-container"><img id="prev2R" class="preview-img"><div id="txt2R" class="draggable-text">1H</div></div></div>
        </div>
    </div>

    <div class="collage-controls">
        <button id="genBtn" class="collage-btn" disabled><i class="fas fa-magic"></i> Создать коллаж</button>
        <button id="dlBtn" class="collage-btn" disabled><i class="fas fa-download"></i> Скачать PNG</button>
    </div>

    <div class="collage-result">
        <div class="collage-with-text">
            <div class="collage-column"><canvas id="collageCanvas"></canvas></div>
            <div class="text-column">
                <textarea id="collageText" placeholder="Введите текст..."></textarea>
                <button id="clearTextBtn" class="clear-text-btn"><i class="fas fa-trash-alt"></i> Очистить</button>
            </div>
        </div>
    </div>

    <div class="combine-collage-section">
        <h3 style="color:#4cc9f0; margin-bottom:10px;">🔗 Объединить два коллажа</h3>
        <div class="combine-row">
            <div class="upload-box"><h3>Первый</h3><input type="file" id="combine1" class="collage-file-input" accept="image/*"><div class="preview-container"><img id="prevC1" class="preview-img"></div></div>
            <div class="upload-box"><h3>Второй</h3><input type="file" id="combine2" class="collage-file-input" accept="image/*"><div class="preview-container"><img id="prevC2" class="preview-img"></div></div>
        </div>
        <div class="collage-controls">
            <button id="combineBtn" class="collage-btn" disabled><i class="fas fa-object-group"></i> Объединить</button>
            <button id="dlCombinedBtn" class="collage-btn" disabled><i class="fas fa-download"></i> Скачать объединённый</button>
        </div>
        <canvas id="combinedCollageCanvas"></canvas>
    </div>
</div>

<script>
(function(){
    const CW = 6000, CH = 4500, TOPH = 2250, BOTH = 2250, TEXTW = 1200;
    let mode = 'three';
    let baseName = '';

    const btn3 = document.getElementById('threeModeBtn');
    const btn4 = document.getElementById('fourModeBtn');
    const btn2 = document.getElementById('twoModeBtn');
    const lay3 = document.getElementById('threeLayout');
    const lay4 = document.getElementById('fourLayout');
    const lay2 = document.getElementById('twoLayout');
    const genBtn = document.getElementById('genBtn');
    const dlBtn = document.getElementById('dlBtn');
    const canvas = document.getElementById('collageCanvas');
    const textarea = document.getElementById('collageText');

    function setMode(m) {
        mode = m;
        btn3.classList.toggle('active', m==='three');
        btn4.classList.toggle('active', m==='four');
        btn2.classList.toggle('active', m==='two');
        lay3.style.display = m==='three' ? 'flex' : 'none';
        lay4.style.display = m==='four' ? 'flex' : 'none';
        lay2.style.display = m==='two' ? 'flex' : 'none';
        genBtn.disabled = true;
        dlBtn.disabled = true;
    }
    btn3.onclick = ()=>setMode('three');
    btn4.onclick = ()=>setMode('four');
    btn2.onclick = ()=>setMode('two');

    function slot(txtId, prevId, selId, def) {
        const el = document.getElementById(txtId);
        el.textContent = def;
        return {
            textEl: el,
            previewImg: document.getElementById(prevId),
            select: document.getElementById(selId),
            image: null,
            pos: {x:15, y:15},
            cW:0, cH:0, iW:0, iH:0
        };
    }

    const d3 = {
        tl: slot('txtTL','prevTL','selTL','1D'),
        tr: slot('txtTR','prevTR','selTR','1H'),
        bt: slot('txtBT','prevBT','selBT','5M')
    };
    const d4 = {
        tl: slot('txt4TL','prev4TL','sel4TL','1D'),
        tr: slot('txt4TR','prev4TR','sel4TR','4H'),
        bl: slot('txt4BL','prev4BL','sel4BL','1H'),
        br: slot('txt4BR','prev4BR','sel4BR','5M')
    };
    const d2 = {
        l: slot('txt2L','prev2L','sel2L','1D'),
        r: slot('txt2R','prev2R','sel2R','1H')
    };

    function getData() {
        if (mode==='three') return d3;
        if (mode==='four') return d4;
        return d2;
    }

    function initDrag(data) {
        Object.values(data).forEach(s=>{
            let offX, offY, drag=false;
            s.textEl.onmousedown = e=>{
                drag=true;
                const r = s.textEl.getBoundingClientRect();
                offX=e.clientX-r.left; offY=e.clientY-r.top;
                e.preventDefault();
            };
            window.addEventListener('mousemove', e=>{
                if(!drag) return;
                const parent = s.textEl.parentElement;
                const pr = parent.getBoundingClientRect();
                let nx = e.clientX-pr.left-offX;
                let ny = e.clientY-pr.top-offY;
                nx = Math.max(0, Math.min(nx, pr.width-s.textEl.offsetWidth));
                ny = Math.max(0, Math.min(ny, pr.height-s.textEl.offsetHeight));
                s.textEl.style.left = nx+'px';
                s.textEl.style.top = ny+'px';
                s.pos = {x:nx, y:ny};
            });
            window.addEventListener('mouseup', ()=>{ drag=false; });
        });
    }
    initDrag(d3); initDrag(d4); initDrag(d2);

    function bindSelects(data) {
        Object.values(data).forEach(s=>{
            s.select.onchange = ()=> { s.textEl.textContent = s.select.value; };
            s.textEl.textContent = s.select.value;
        });
    }
    bindSelects(d3); bindSelects(d4); bindSelects(d2);

    function bindUpload(inputId, key, data) {
        const inp = document.getElementById(inputId);
        if(!inp) return;
        inp.onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            if(key==='tl' || key==='l') baseName = file.name.replace(/\.[^.]+$/,'');
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = ()=>{
                    data[key].image = img;
                    data[key].previewImg.src = ev.target.result;
                    data[key].previewImg.style.display = 'block';
                    checkReady();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };
    }
    bindUpload('imgTL','tl',d3); bindUpload('imgTR','tr',d3); bindUpload('imgBT','bt',d3);
    bindUpload('img4TL','tl',d4); bindUpload('img4TR','tr',d4); bindUpload('img4BL','bl',d4); bindUpload('img4BR','br',d4);
    bindUpload('img2L','l',d2); bindUpload('img2R','r',d2);

    function checkReady() {
        const data = getData();
        genBtn.disabled = !Object.values(data).every(s=>s.image);
    }

    function drawTxt(ctx, s, text, ox, oy, tw, th) {
        if(!s.iW) return;
        const sx = tw/s.iW, sy = th/s.iH;
        const px = s.pos.x, py = s.pos.y;
        const tx = ox + (px/s.cW)*s.iW*sx;
        const ty = oy + (py/s.cH)*s.iH*sy;
        ctx.font = 'bold 120px Montserrat';
        ctx.fillStyle = 'white';
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 8;
        ctx.fillText(text, tx, ty+110);
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    }

    function updateSizes(data) {
        Object.values(data).forEach(s=>{
            if(s.previewImg.style.display==='block'){
                const p = s.previewImg.parentElement;
                s.cW = p.offsetWidth; s.cH = p.offsetHeight;
                s.iW = s.previewImg.naturalWidth; s.iH = s.previewImg.naturalHeight;
            }
        });
    }

    genBtn.onclick = ()=>{
        const data = getData();
        updateSizes(data);
        canvas.width = CW; canvas.height = CH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#1a1a26'; ctx.fillRect(0,0,CW,CH);

        if(mode==='three'){
            const w2=CW/2;
            ctx.drawImage(d3.tl.image,0,0,w2,TOPH);
            drawTxt(ctx, d3.tl, d3.tl.textEl.textContent,0,0,w2,TOPH);
            ctx.drawImage(d3.tr.image,w2,0,w2,TOPH);
            drawTxt(ctx, d3.tr, d3.tr.textEl.textContent,w2,0,w2,TOPH);
            ctx.drawImage(d3.bt.image,0,TOPH,CW,BOTH);
            drawTxt(ctx, d3.bt, d3.bt.textEl.textContent,0,TOPH,CW,BOTH);
        } else if(mode==='four'){
            const hw=CW/2, hh=CH/2;
            ctx.drawImage(d4.tl.image,0,0,hw,hh); drawTxt(ctx,d4.tl,d4.tl.textEl.textContent,0,0,hw,hh);
            ctx.drawImage(d4.tr.image,hw,0,hw,hh); drawTxt(ctx,d4.tr,d4.tr.textEl.textContent,hw,0,hw,hh);
            ctx.drawImage(d4.bl.image,0,hh,hw,hh); drawTxt(ctx,d4.bl,d4.bl.textEl.textContent,0,hh,hw,hh);
            ctx.drawImage(d4.br.image,hw,hh,hw,hh); drawTxt(ctx,d4.br,d4.br.textEl.textContent,hw,hh,hw,hh);
        } else {
            const hh=CH/2;
            ctx.drawImage(d2.l.image,0,0,CW,hh); drawTxt(ctx,d2.l,d2.l.textEl.textContent,0,0,CW,hh);
            ctx.drawImage(d2.r.image,0,hh,CW,hh); drawTxt(ctx,d2.r,d2.r.textEl.textContent,0,hh,CW,hh);
        }
        canvas.style.display='block';
        dlBtn.disabled=false;
        canvas.scrollIntoView({behavior:'smooth'});
    };

    dlBtn.onclick = ()=>{
        if(canvas.style.display==='none') return;
        const txt = textarea.value.trim();
        const fc = document.createElement('canvas');
        fc.width = txt ? CW+TEXTW : CW;
        fc.height = CH;
        const ctx = fc.getContext('2d');
        ctx.fillStyle='#1a1a26'; ctx.fillRect(0,0,fc.width,fc.height);
        ctx.drawImage(canvas,0,0);
        if(txt){
            ctx.fillStyle='#1e1e2e'; ctx.fillRect(CW,0,TEXTW,CH);
            ctx.fillStyle='white'; ctx.font='36px Roboto';
            let y=60;
            txt.split('\n').forEach(line=>{
                if(y<CH-40){ ctx.fillText(line,CW+50,y); y+=48; }
            });
        }
        const a=document.createElement('a');
        a.download = baseName ? baseName+'.png' : 'collage.png';
        a.href=fc.toDataURL('image/png'); a.click();
    };

    document.getElementById('clearTextBtn').onclick = ()=> textarea.value='';

    // Объединение коллажей
    let img1=null, img2=null, combineName='';
    const c1=document.getElementById('combine1'), c2=document.getElementById('combine2');
    const p1=document.getElementById('prevC1'), p2=document.getElementById('prevC2');
    const combBtn=document.getElementById('combineBtn'), dlComb=document.getElementById('dlCombinedBtn');
    const combCanvas=document.getElementById('combinedCollageCanvas');

    function loadC(inp, prev, setter){
        inp.onchange = e=>{
            const f=e.target.files[0]; if(!f) return;
            if(inp===c1) combineName=f.name.replace(/\.[^.]+$/,'');
            const r=new FileReader();
            r.onload=ev=>{
                const img=new Image();
                img.onload=()=>{ setter(img); prev.src=ev.target.result; prev.style.display='block'; combBtn.disabled=!(img1&&img2); };
                img.src=ev.target.result;
            };
            r.readAsDataURL(f);
        };
    }
    loadC(c1,p1,i=>{img1=i;}); loadC(c2,p2,i=>{img2=i;});

    combBtn.onclick=()=>{
        if(!img1||!img2) return;
        combCanvas.width=CW; combCanvas.height=CH*2;
        const ctx=combCanvas.getContext('2d');
        ctx.fillStyle='#1a1a26'; ctx.fillRect(0,0,CW,CH*2);
        ctx.drawImage(img1,0,0,CW,CH);
        ctx.drawImage(img2,0,CH,CW,CH);
        combCanvas.style.display='block'; dlComb.disabled=false;
    };
    dlComb.onclick=()=>{
        if(combCanvas.style.display==='none') return;
        const a=document.createElement('a');
        a.download = combineName ? combineName+'-combined.png' : 'combined.png';
        a.href=combCanvas.toDataURL('image/png'); a.click();
    };
})();
</script>
</body>
</html>
